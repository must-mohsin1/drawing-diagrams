  - id: dev
    title: Dev / Build / Lint (devDependencies)
    color_zone_bg: "#e0e7ff"
    color_zone_stroke: "#4f46e5"
    color_header: "#3730a3"
    color_box_bg: "#c7d2fe"
    color_box_stroke: "#4f46e5"
    # devDependencies catch-all — no patterns; everything declared as dev lands here

# Family collapse rules — same idea as @types/* in npm.
# Useful for langchain (which ships dozens of related sub-packages).
collapse_families:
  - pattern: "^langchain-"
    label_template: "langchain-* ({n} integrations)"
    min_members: 3
  - pattern: "^@types/"
    label_template: "@types/* ({members})"
  - pattern: "^pytest-"
    label_template: "pytest-* ({n} plugins)"
    min_members: 3
  - pattern: "^ruamel\\."
    label_template: "ruamel.* ({n} pkgs)"
    min_members: 2

# Same layout knobs as the npm rules; the gen script's predict_wrap_lines
# handles per-row dynamic heights automatically.
layout:
  canvas_width: 720
  zone_x: 40
  title_y: 100
  row_gap: 20
  zone_padding: 20
  internal_gutter: 20
  cols_per_zone: 3
  box_height_default: 60
  pitch: 70
  header_height: 25
  bottom_padding: 30
