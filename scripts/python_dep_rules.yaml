# Python (PyPI) dep-map categorization rules.
# Buckets matched in declaration order. Unmatched runtime deps fall through to
# "utils". devDependencies (PEP 735 [dependency-groups] / Poetry dev / etc.)
# ALWAYS go to "dev" regardless of pattern — author's declaration beats regex.

buckets:
  - id: webapi
    title: Web / API
    color_zone_bg: "#dbe4ff"
    color_zone_stroke: "#4a9eed"
    color_header: "#2563eb"
    color_box_bg: "#a5d8ff"
    color_box_stroke: "#4a9eed"
    patterns:
      - "^fastapi$"
      - "^starlette$"
      - "^flask"
      - "^django"
      - "^sanic$"
      - "^aiohttp$"
      - "^uvicorn"
      - "^gunicorn$"
      - "^hypercorn$"
      - "^sse-starlette$"
      - "^python-multipart$"
      - "^litestar$"
      - "^bottle$"

  - id: ai
    title: AI / LLM / Agents
    color_zone_bg: "#e5dbff"
    color_zone_stroke: "#8b5cf6"
    color_header: "#6d28d9"
    color_box_bg: "#d0bfff"
    color_box_stroke: "#8b5cf6"
    patterns:
      - "^openai$"
      - "^anthropic$"
      - "^mistralai$"
      - "^cohere$"
      - "^langchain"
      - "^langgraph"
      - "^langfuse$"
      - "^llama-index"
      - "^llama_index"
      - "^firecrawl"
      - "^exa-py$"
      - "^fal-client$"
      - "^edge-tts$"
      - "^parallel-web$"
      - "^litellm$"
      - "^instructor$"
      - "^haystack"
      - "^semantic-kernel$"

  - id: data
    title: Data / Numerics / ML
    color_zone_bg: "#c3fae8"
    color_zone_stroke: "#06b6d4"
    color_header: "#0e7490"
    color_box_bg: "#9ee7d8"
    color_box_stroke: "#06b6d4"
    patterns:
      - "^numpy$"
      - "^pandas$"
      - "^polars$"
      - "^scipy$"
      - "^statsmodels$"
      - "^scikit-learn$"
      - "^matplotlib$"
      - "^seaborn$"
      - "^plotly$"
      - "^pyarrow$"
      - "^duckdb$"
      - "^torch$"
      - "^tensorflow$"
      - "^jax$"
      - "^transformers$"
