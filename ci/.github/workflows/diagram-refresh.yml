name: Refresh dependency diagram

# Regenerates docs/diagrams/deps.excalidraw.json from package.json on every
# dependency-graph change. Opens a PR if the diagram differs.
#
# Security note: this workflow only consumes trusted GitHub-generated values
# (github.sha, github.run_id, secrets.GITHUB_TOKEN) — never user-controllable
# fields like issue titles, PR bodies, or commit messages.

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - ".ci/diagrams/dep_rules.yaml"
      - ".github/workflows/diagram-refresh.yml"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RUN_ID: ${{ github.run_id }}
      SOURCE_SHA: ${{ github.sha }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout canvas server
        uses: actions/checkout@v4
        with:
          repository: yctimlin/mcp_excalidraw
          path: .canvas-server
          ref: main

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Install + build canvas server
        working-directory: .canvas-server
        run: |
          npm install --no-audit --no-fund
          npm run build:server

      - name: Start canvas server
        working-directory: .canvas-server
        env:
          PORT: "3030"
        run: |
          nohup node dist/server.js > /tmp/canvas.log 2>&1 &
          echo $! > /tmp/canvas.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3030/health >/dev/null; then
              echo "canvas ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: canvas server did not come up in 30s"
          cat /tmp/canvas.log
          exit 1

      - name: Generate diagram
        run: |
          python3 .ci/diagrams/gen_deps_diagram.py \
            --package package.json \
            --rules   .ci/diagrams/dep_rules.yaml \
            --canvas  http://127.0.0.1:3030 \
            --output  docs/diagrams/deps.excalidraw.json

      - name: Stop canvas server
        if: always()
        run: |
          if [ -f /tmp/canvas.pid ]; then
            kill "$(cat /tmp/canvas.pid)" 2>/dev/null || true
          fi

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet docs/diagrams/deps.excalidraw.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No diagram changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Diagram changed:"
            git diff --stat docs/diagrams/deps.excalidraw.json
          fi

      - name: Open PR with refreshed diagram
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: docs/diagrams-refresh-${{ env.RUN_ID }}
          title: "docs(diagrams): refresh dependency map"
          commit-message: |
            docs(diagrams): refresh dependency map

            Regenerated docs/diagrams/deps.excalidraw.json from package.json
            via .ci/diagrams/gen_deps_diagram.py.
          body: |
            ## Auto-refreshed dependency diagram

            The committed `docs/diagrams/deps.excalidraw.json` was stale relative to the current `package.json`. This PR regenerates it.

            **What to review:**
            - Any new packages in unexpected zones → may need a rule in `.ci/diagrams/dep_rules.yaml`
            - Layout sanity (open the JSON in https://excalidraw.com to preview)
            - Verification ran in CI (containment + gap checks); failures would have blocked this PR

            Generated by .github/workflows/diagram-refresh.yml
          labels: |
            docs
            automated

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "::notice::Dependency diagram regenerated — PR opened."
          else
            echo "::notice::Dependency diagram unchanged; no PR needed."
          fi
